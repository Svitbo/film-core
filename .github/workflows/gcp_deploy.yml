name: Deploy to GCP

on:
  push:
    branches:
      - main
      - develop
      - add-gh-actions-gcp-deployment # Remove later

jobs:
  pull-code:
    runs-on: ubuntu-latest

    steps:
      - name: "Deploy core to the GCP"
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            BRANCH='main'
            CREDENTIALS='${{ secrets.PROD_GCP_SA_CREDENTIALS }}'
            INSTANCE_NAME='${{ secrets.PROD_GCP_INSTANCE_NAME }}'
            SSH_PRIVATE_KEY='${{ secrets.PROD_GCP_SSH_PRIVATE_KEY }}'
            ZONE='${{ secrets.PROD_GCP_ZONE }}'
          elif [[ '${{ github.ref }}' == 'refs/heads/add-gh-actions-gcp-deployment' ]]; then
            BRANCH='develop'
            CREDENTIALS='${{ secrets.DEV_GCP_SA_CREDENTIALS }}'
            INSTANCE_NAME='${{ secrets.DEV_GCP_INSTANCE_NAME }}'
            SSH_PRIVATE_KEY='${{ secrets.DEV_GCP_SSH_PRIVATE_KEY }}'
            ZONE='${{ secrets.DEV_GCP_ZONE }}'
          else
            echo "Not a main or develop branch. Well, we shouldn't be here at all"
          fi
        env:
          VAR: ${{ secrets.PROD_GCP_INSTANCE_NAME }}

      - name: "test"
        run: |
          echo ${{ env.VAR }}
          echo $VAR
        env:
          VAR: "123"

      - name: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          credentials_json: "$CREDENTIALS"

      - name: "?????"
        uses: "google-github-actions/ssh-compute@v1"
        with:
          instance_name: "$INSTANCE"
          zone: "$ZONE"
          ssh_private_key: "${{ secrets.DEV_GCP_SSH_PRIVATE_KEY }}"
          command: "whoami"
